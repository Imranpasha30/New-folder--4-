# Production stack — runs on the EC2 box.
# All 3 services share an internal Docker network. Only Caddy exposes ports
# 80/443 to the host. Web + MP are reachable only inside the container network.
#
# Required environment variables (set by deploy.yml or via shell export):
#   GHCR_IMAGE          — full image name like ghcr.io/imranpasha30/portfolio:latest
#   GEMINI_KEY          — passed through to the web service for the chatbot proxy
#   GMAIL_USER          — sender Gmail address for the contact form
#   GMAIL_APP_PASSWORD  — 16-char app password (myaccount.google.com/apppasswords, 2FA required)
#   CONTACT_TO          — recipient address (defaults to GMAIL_USER)
#   HCAPTCHA_SITE_KEY   — public site key from dashboard.hcaptcha.com (free tier)
#   HCAPTCHA_SECRET     — server secret key (NEVER commit; never expose to client)
services:
  web:
    image: ${GHCR_IMAGE}
    restart: always
    container_name: portfolio-web
    environment:
      - NODE_ENV=production
      - GEMINI_KEY=${GEMINI_KEY}
      - VISITS_DATA_DIR=/data
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - CONTACT_TO=${CONTACT_TO:-}
      - HCAPTCHA_SITE_KEY=${HCAPTCHA_SITE_KEY}
      - HCAPTCHA_SECRET=${HCAPTCHA_SECRET}
    expose:
      - "5181"
    volumes:
      - visits_data:/data    # persistent visits.json — survives container recreations
    networks: [internal]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5181/"]
      interval: 30s
      timeout: 5s
      retries: 3

  mp:
    image: ${GHCR_IMAGE}
    restart: always
    container_name: portfolio-mp
    command: ["node", "multiplayer-server.js"]
    environment:
      - NODE_ENV=production
    expose:
      - "5182"
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: always
    container_name: portfolio-caddy
    # Caddy listens on 80 (Let's Encrypt HTTP-01 challenge) and 443 (HTTPS).
    # Make sure EC2 security group has both ports open inbound from 0.0.0.0/0.
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]
    depends_on:
      - web
      - mp

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  visits_data:    # persistent visit log — survives container recreations
